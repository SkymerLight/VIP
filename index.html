<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Manager • Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');

        :root {
            --bg: #050505;
            --card-bg: #0f0f12;
            --accent-green: #00ff88;
            --accent-warn: #ffcc00;
            --accent-error: #ff4444;
            --text-dim: #55555e;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
        }

        .card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 25px;
            text-align: center;
            width: 100%;
            max-width: 380px; /* Largura ideal no PC */
            border: 1px solid #222;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .hoje-status {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* CORREÇÃO PARA MOBILE (TEXTO PRETO NO FUNDO PRETO) */
        input[type="date"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1a1a1e;
            background: #000 !important;
            color: #ffffff !important; /* Força texto branco */
            color-scheme: dark; /* Avisa o sistema que o site é dark */
            font-size: 1.1rem;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
            font-family: inherit;
            display: block;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
        }

        .display-container {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.03);
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .num {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 5px 0;
        }

        @media (max-width: 400px) {
            .num { font-size: 4rem; }
        }

        .color-safe { color: var(--accent-green); text-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        .color-warn { color: var(--accent-warn); text-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        .color-expired { color: var(--accent-error); text-shadow: 0 0 20px rgba(255, 68, 68, 0.2); }

        .btn-copy {
            background: #1a1a1e;
            border: 1px solid #333;
            color: #888;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 15px;
            width: 100%;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-copy:active { background: #fff; color: #000; }
        
        #msgInfo {
            font-size: 0.7rem;
            color: var(--accent-green);
            margin-top: 8px;
            height: 10px;
            font-weight: bold;
            opacity: 0;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="hoje-status">STAFF PANEL • <span id="dataAtual"></span></div>
    
    <input type="date" id="dataFim">

    <div id="displayArea" style="display: none;">
        <div class="display-container">
            <div class="label" id="topLabel">RESTAM</div>
            <div id="resultadoNum" class="num">0</div>
            <div class="label">DIAS</div>
        </div>
        <button class="btn-copy" onclick="copy()">Copiar Dias</button>
        <div id="msgInfo">COPIADO!</div>
    </div>
</div>

<script>
    const input = document.getElementById('dataFim');
    const displayArea = document.getElementById('displayArea');
    const resultadoNum = document.getElementById('resultadoNum');
    const topLabel = document.getElementById('topLabel');
    const msgInfo = document.getElementById('msgInfo');

    document.getElementById('dataAtual').innerText = new Date().toLocaleDateString('pt-BR');

    input.addEventListener('input', () => {
        if(!input.value) return;
        
        const [ano, mes, dia] = input.value.split('-');
        const dataFim = new Date(ano, mes - 1, dia);
        const hoje = new Date();
        hoje.setHours(0,0,0,0);

        const diff = Math.ceil((dataFim - hoje) / 86400000);
        
        displayArea.style.display = 'block';
        resultadoNum.innerText = Math.abs(diff);
        
        resultadoNum.classList.remove('color-safe', 'color-warn', 'color-expired');
        
        if (diff > 3) {
            resultadoNum.classList.add('color-safe');
            topLabel.innerText = "RESTAM";
        } else if (diff >= 0) {
            resultadoNum.classList.add('color-warn');
            topLabel.innerText = "EXPIRA LOGO";
        } else {
            resultadoNum.classList.add('color-expired');
            topLabel.innerText = "VENCIDO HÁ";
        }
    });

    function copy() {
        navigator.clipboard.writeText(resultadoNum.innerText);
        msgInfo.style.opacity = '1';
        setTimeout(() => msgInfo.style.opacity = '0', 1500);
    }
</script>

</body>
</html>
