<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Manager • Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');

        :root {
            --bg: #050505;
            --card-bg: #0f0f12;
            --accent-green: #00ff88;
            --accent-warn: #ffcc00;
            --accent-error: #ff4444;
            --text-dim: #55555e;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Margem de segurança para telas pequenas */
            box-sizing: border-box;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
        }

        .card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            width: 100%;
            max-width: 400px; /* No PC não passa disso */
            border: 1px solid #222;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }

        /* AJUSTE PARA MOBILE */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
                border-radius: 20px;
            }
            .num {
                font-size: 4.5rem !important; /* Diminui um pouco o número no celular */
            }
            input[type="date"] {
                font-size: 1.2rem !important; /* Aumenta o texto da data para facilitar o toque */
                padding: 18px !important;
            }
        }

        .hoje-status {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        input[type="date"] {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #1a1a1e;
            background: #000;
            color: #fff;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: inherit;
            appearance: none; /* Remove estilos padrão do sistema */
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }

        input:focus { border-color: #444; }

        .display-container {
            margin-top: 25px;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .num {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            margin: 10px 0;
            transition: 0.3s;
        }

        .color-safe { color: var(--accent-green); text-shadow: 0 0 25px rgba(0, 255, 136, 0.3); }
        .color-warn { color: var(--accent-warn); text-shadow: 0 0 25px rgba(255, 204, 0, 0.3); }
        .color-expired { color: var(--accent-error); text-shadow: 0 0 25px rgba(255, 68, 68, 0.3); }

        .btn-copy {
            background: #1a1a1e;
            border: 1px solid #333;
            color: #999;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 20px;
            transition: 0.2s;
            text-transform: uppercase;
            width: 100%; /* Botão largo no celular fica melhor */
        }

        .btn-copy:hover {
            background: #fff;
            color: #000;
        }

        #msgStatus {
            margin-top: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            height: 15px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="hoje-status">STAFF PANEL • <span id="dataAtual"></span></div>
    
    <input type="date" id="dataFim">

    <div id="displayArea" style="display: none;">
        <div class="display-container">
            <div class="label" id="topLabel">RESTAM</div>
            <div class="num" id="resultadoNum">0</div>
            <div class="label">DIAS</div>
        </div>
        <button class="btn-copy" id="btnCopiar" onclick="copy()">Copiar Número</button>
        <div id="msgStatus"></div>
    </div>
</div>

<script>
    const input = document.getElementById('dataFim');
    const displayArea = document.getElementById('displayArea');
    const resultadoNum = document.getElementById('resultadoNum');
    const topLabel = document.getElementById('topLabel');
    const btnCopiar = document.getElementById('btnCopiar');
    const msgStatus = document.getElementById('msgStatus');

    document.getElementById('dataAtual').innerText = new Date().toLocaleDateString('pt-BR');

    input.addEventListener('input', () => {
        if(!input.value) return;
        
        const [ano, mes, dia] = input.value.split('-');
        const dataFim = new Date(ano, mes - 1, dia);
        const hoje = new Date();
        hoje.setHours(0,0,0,0);

        const diff = Math.ceil((dataFim - hoje) / (86400000));
        
        displayArea.style.display = 'block';
        resultadoNum.innerText = Math.abs(diff);
        
        resultadoNum.classList.remove('color-safe', 'color-warn', 'color-expired');
        
        if (diff > 3) {
            resultadoNum.classList.add('color-safe');
            topLabel.innerText = "RESTAM";
        } else if (diff >= 0) {
            resultadoNum.classList.add('color-warn');
            topLabel.innerText = "EXPIRA LOGO";
        } else {
            resultadoNum.classList.add('color-expired');
            topLabel.innerText = "VENCIDO HÁ";
        }
    });

    function copy() {
        navigator.clipboard.writeText(resultadoNum.innerText);
        msgStatus.innerText = "NÚMERO COPIADO!";
        msgStatus.style.color = "#00ff88";
        
        setTimeout(() => {
            msgStatus.innerText = "";
        }, 2000);
    }
</script>

</body>
</html>
